### Warden Kiosk — Debian 12 (Bookworm) Preseed
### Automated minimal install for single-app Flutter kiosk

#---------------------------------------------------------------------------
# Localization
#---------------------------------------------------------------------------
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

#---------------------------------------------------------------------------
# Network
#---------------------------------------------------------------------------
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string warden-kiosk
d-i netcfg/get_domain string local

# ---------------------------------------------------------------------------
# WiFi (optional) — uncomment and fill in SSID/passphrase to use WiFi
# Leave commented out to use wired Ethernet (recommended for kiosk use)
#
# Example — visible network (most common):
#   d-i netcfg/wireless_essid string HomeNetwork
#   d-i netcfg/wireless_security_type select wpa
#   d-i netcfg/wireless_wpa string MyWifiPassword123
#
# Example — hidden network (SSID not broadcast):
#   d-i netcfg/wireless_essid string HiddenNetwork
#   d-i netcfg/wireless_essid_again string HiddenNetwork
#   d-i netcfg/wireless_security_type select wpa
#   d-i netcfg/wireless_wpa string MyWifiPassword123
#
# Example — open network (no password):
#   d-i netcfg/wireless_essid string GuestWifi
#   d-i netcfg/wireless_security_type select none
# ---------------------------------------------------------------------------
#d-i netcfg/wireless_essid string YOUR_WIFI_SSID
#d-i netcfg/wireless_security_type select wpa
#d-i netcfg/wireless_wpa string YOUR_WIFI_PASSWORD

# Suppress WEP prompt (always leave this uncommented)
d-i netcfg/wireless_wep string

#---------------------------------------------------------------------------
# Mirror
#---------------------------------------------------------------------------
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string trixie

#---------------------------------------------------------------------------
# Clock / Time zone
#---------------------------------------------------------------------------
d-i clock-setup/utc boolean true
# Change to your timezone, e.g. America/New_York, Europe/London
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

#---------------------------------------------------------------------------
# Partitioning — entire disk, LVM, no swap (kiosk: RAM is enough)
#---------------------------------------------------------------------------
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

d-i partman-auto/choose_recipe select atomic
d-i partman-auto-lvm/new_vg_name string vg0

d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

#---------------------------------------------------------------------------
# Users — root disabled, single warden user
#---------------------------------------------------------------------------
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Warden Kiosk
d-i passwd/username string warden
# Change this password! Generate with: printf 'yourpassword' | mkpasswd -s -m sha-512
d-i passwd/user-password-crypted password $6$YUqM5q6JBqthDzmn$4H/0s19brfeU0g9WXFaXkl1UACpA5wuStYBrgdELj0d4M59ODcpLFJMCcD5ITQkSHrOn1OJMTHBbbM/BSYVa./
d-i passwd/user-default-groups string audio video netdev sudo

#---------------------------------------------------------------------------
# Package selection — bare minimum + SSH
#---------------------------------------------------------------------------
tasksel tasksel/first multiselect standard
d-i pkgsel/include string \
    openssh-server \
    curl \
    wget \
    git \
    unzip \
    ca-certificates \
    sudo \
    wpasupplicant \
    wireless-tools \
    \
    cage \
    xwayland \
    libgl1 \
    libgles2 \
    libegl1 \
    libgbm1 \
    libvulkan1 \
    \
    libgtk-3-0 \
    libglib2.0-0 \
    libpango-1.0-0 \
    libcairo2 \
    libgdk-pixbuf-2.0-0 \
    libatk1.0-0 \
    libx11-6 \
    libxcomposite1 \
    libxdamage1 \
    libxext6 \
    libxfixes3 \
    libxrandr2 \
    libxrender1 \
    libstdc++6 \
    \
    fonts-noto-core \
    \
    pipewire \
    pipewire-pulse \
    wireplumber \
    alsa-utils

d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

#---------------------------------------------------------------------------
# Bootloader
#---------------------------------------------------------------------------
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string default

#---------------------------------------------------------------------------
# Post-install script — downloads and runs warden-setup.sh from GitHub
#---------------------------------------------------------------------------
d-i preseed/late_command string \
    in-target wget -q https://raw.githubusercontent.com/omgwtfkrieg/warden/main/kiosk/warden-setup.sh -O /tmp/warden-setup.sh; \
    in-target bash /tmp/warden-setup.sh; \
    sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /target/etc/ssh/sshd_config; \
    echo "Warden kiosk post-install complete."

#---------------------------------------------------------------------------
# Finish
#---------------------------------------------------------------------------
d-i finish-install/reboot_in_progress note
